name: Validate Peak Lift

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebApp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WebApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

  ios:
    name: iOS build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: iOS
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build iOS app
        run: xcodebuild -project PeakLift.xcodeproj -scheme PeakLift -destination 'generic/platform=iOS Simulator' build CODE_SIGNING_ALLOWED=NO
